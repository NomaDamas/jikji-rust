<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Jikji — AI agents stop wandering through files</title>
  <desc id="desc">As-is: an agent endlessly searches many files. To-be: an agent uses a Jikji map and finds the target directly.</desc>
  <defs>
    <radialGradient id="bgA" cx="18%" cy="0%" r="58%"><stop offset="0" stop-color="#7dd9ff" stop-opacity=".28"/><stop offset=".72" stop-color="#7dd9ff" stop-opacity="0"/></radialGradient>
    <radialGradient id="bgB" cx="88%" cy="5%" r="52%"><stop offset="0" stop-color="#b8a1ff" stop-opacity=".25"/><stop offset=".72" stop-color="#b8a1ff" stop-opacity="0"/></radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7dd9ff"/><stop offset="1" stop-color="#65f2ad"/></linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff"/><stop offset=".5" stop-color="#7dd9ff"/><stop offset="1" stop-color="#65f2ad"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity=".35"/></filter>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif}.mono{font-family:"SFMono-Regular",Consolas,monospace}.text{fill:#f5f8ff}.muted{fill:#aab5ca}.blue{fill:#7dd9ff}.green{fill:#65f2ad}.amber{fill:#ffd166}.panel{fill:rgba(255,255,255,.055);stroke:rgba(255,255,255,.14);stroke-width:1.2}.inner{fill:rgba(7,11,20,.66);stroke:rgba(255,255,255,.12);stroke-width:1}.file{fill:#151f33;stroke:#42506b;stroke-width:1}.paper{fill:#f5f8ff}.folder{fill:#ffd166}.map{fill:#65f2ad}.line{stroke:#7dd9ff;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 10}.direct{stroke:#65f2ad;stroke-width:6;stroke-linecap:round}.thin{stroke:rgba(255,255,255,.18);stroke-width:1}
    </style>
  </defs>
  <rect width="1200" height="620" fill="#070b14"/><rect width="1200" height="620" fill="url(#bgA)"/><rect width="1200" height="620" fill="url(#bgB)"/>
  <g class="sans">
    <g transform="translate(64 38)"><rect width="42" height="42" rx="14" fill="url(#brand)"/><text x="21" y="28" text-anchor="middle" font-size="22" font-weight="950" fill="#06101c">직</text><text x="56" y="29" font-size="26" font-weight="950" class="text">Jikji</text><text x="1010" y="27" text-anchor="end" font-size="14" font-weight="750" class="muted">Local file maps for AI agents · 로컬 에이전트 파일 지도</text></g>
    <text x="600" y="126" text-anchor="middle" font-size="56" font-weight="950" letter-spacing="-3" fill="url(#titleGrad)">Stop wandering. Read the map.</text>
    <text x="600" y="160" text-anchor="middle" font-size="21" font-weight="700" class="muted">헤매며 찾지 말고, 지도를 보고 바로 찾게 한다.</text>

    <g transform="translate(70 205)" filter="url(#shadow)">
      <rect class="panel" width="520" height="330" rx="30"/>
      <text x="28" y="50" font-size="16" font-weight="950" class="amber">AS-IS · Raw agent</text>
      <text x="28" y="84" font-size="27" font-weight="950" class="text">Endless file hunting</text>
      <text x="28" y="112" font-size="17" font-weight="700" class="muted">무한히 폴더와 파일을 뒤진다</text>
      <g transform="translate(34 142)">
        <path class="line" d="M60 100 C90 20,150 20,170 88 S260 170,292 70 S390 18,430 92" fill="none"/>
        <g transform="translate(18 10)"><rect class="file" x="0" y="0" width="58" height="70" rx="8"/><path class="paper" d="M13 16h31v5H13zm0 14h34v5H13zm0 14h22v5H13z" opacity=".75"/></g>
        <g transform="translate(128 42)"><rect class="file" x="0" y="0" width="58" height="70" rx="8"/><path class="paper" d="M13 16h31v5H13zm0 14h20v5H13zm0 14h32v5H13z" opacity=".75"/></g>
        <g transform="translate(250 6)"><rect class="file" x="0" y="0" width="58" height="70" rx="8"/><path class="paper" d="M13 16h28v5H13zm0 14h34v5H13zm0 14h17v5H13z" opacity=".75"/></g>
        <g transform="translate(370 44)"><rect class="file" x="0" y="0" width="58" height="70" rx="8"/><path class="paper" d="M13 16h31v5H13zm0 14h34v5H13zm0 14h24v5H13z" opacity=".75"/></g>
        <g transform="translate(188 134)"><path class="folder" d="M0 16h62l8 12h116v86H0z" opacity=".95"/><rect x="0" y="28" width="186" height="92" rx="10" fill="#d89d35" opacity=".9"/><text x="93" y="82" text-anchor="middle" font-size="18" font-weight="900" fill="#271a06">?</text></g>
        <text x="228" y="270" text-anchor="middle" font-size="18" font-weight="850" class="muted">guess → list → grep → open → repeat</text>
      </g>
    </g>

    <g transform="translate(610 205)" filter="url(#shadow)">
      <rect class="panel" width="520" height="330" rx="30"/>
      <text x="28" y="50" font-size="16" font-weight="950" class="green">TO-BE · Agent + Jikji</text>
      <text x="28" y="84" font-size="27" font-weight="950" class="text">Map-first discovery</text>
      <text x="28" y="112" font-size="17" font-weight="700" class="muted">직지맵을 보고 바로 찾는다</text>
      <g transform="translate(38 144)">
        <g transform="translate(0 42)"><rect class="inner" width="118" height="98" rx="18"/><circle cx="59" cy="34" r="18" fill="#7dd9ff" opacity=".9"/><text x="59" y="70" text-anchor="middle" font-size="15" font-weight="900" class="text">Agent</text></g>
        <path class="direct" d="M130 92 L210 92"/>
        <polygon points="210,92 194,82 194,102" fill="#65f2ad"/>
        <g transform="translate(224 14)"><rect width="140" height="154" rx="20" fill="#10291e" stroke="#65f2ad" stroke-width="2"/><path d="M34 34 L105 26 L105 116 L34 126 Z" fill="#65f2ad" opacity=".88"/><path d="M52 42 L52 118 M72 36 L72 122 M92 31 L92 112 M39 62 L101 54 M39 82 L101 74 M39 102 L101 94" class="thin"/><text x="70" y="146" text-anchor="middle" font-size="15" font-weight="950" class="green">Jikji Map</text></g>
        <path class="direct" d="M378 92 L440 92"/>
        <polygon points="440,92 424,82 424,102" fill="#65f2ad"/>
        <g transform="translate(438 42)"><rect class="file" width="70" height="88" rx="10" fill="#102033" stroke="#65f2ad" stroke-width="2"/><path class="paper" d="M16 20h38v6H16zm0 18h42v6H16zm0 18h30v6H16z" opacity=".82"/><circle cx="58" cy="18" r="12" fill="#65f2ad"/><path d="M52 18l5 5 10-12" fill="none" stroke="#06101c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
        <text x="254" y="214" text-anchor="middle" font-size="18" font-weight="850" class="muted">brief → ranked path → verify</text>
      </g>
    </g>

    <g transform="translate(106 575)" class="mono">
      <text x="0" y="0" font-size="15" class="blue">000_JIKJI_AGENT_MAP.md</text><text x="250" y="0" font-size="15" class="muted">.jikji/search_index.sqlite</text><text x="520" y="0" font-size="15" class="muted">.jikji/doc_text/</text><text x="710" y="0" font-size="15" class="muted">file_cards.jsonl</text><text x="900" y="0" font-size="15" class="muted">agent_routes.md</text>
    </g>
  </g>
</svg>

name: Publish Crates

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run cargo publish --dry-run instead of publishing.
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  crates-io:
    name: crates.io trusted publish
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Package verification
        run: cargo package --workspace --exclude jikji-parity --exclude jikji-bench

      - name: Authenticate with crates.io trusted publishing
        id: auth
        if: github.event_name == 'release' || inputs.dry_run == false
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          crates=(
            jikji-core
            jikji-media-bridge
            jikji-parser
            jikji-search
            jikji-agent
            jikji-index
            jikji-cli
          )
          publish_crate() {
            crate="$1"
            if [ "$DRY_RUN" = "true" ]; then
              cargo publish --dry-run -p "$crate"
              return
            fi
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate"; then
                return
              fi
              echo "publish failed for $crate on attempt $attempt; waiting for registry index"
              sleep 30
            done
            cargo publish -p "$crate"
          }
          for crate in "${crates[@]}"; do
            publish_crate "$crate"
          done

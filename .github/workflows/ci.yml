name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Python reference package
        run: python -m pip install -e . pytest

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace --all-features

      - name: Python parity contract tests
        run: python -m pytest tests/parity -q

      - name: Documentation smoke
        run: cargo doc --workspace --all-features --no-deps

      - name: Cross-OS command smoke
        shell: bash
        run: |
          set -euo pipefail
          root="$(mktemp -d)"
          mkdir -p "$root/docs"
          printf 'ACME release smoke marker\n' > "$root/docs/acme.txt"
          cargo run -p jikji-cli --bin jikji -- --help >/dev/null
          cargo run -p jikji-cli --bin jikji -- prepare "$root" --json
          cargo run -p jikji-cli --bin jikji -- doctor "$root" --json
          cargo run -p jikji-cli --bin jikji -- find "$root" "ACME release smoke marker" --json

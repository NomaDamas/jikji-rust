name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Python reference package
        run: python -m pip install -e python/jikji pytest

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace --all-features

      - name: Python parity contract tests
        if: runner.os != 'Windows'
        run: python -m pytest python/jikji/tests tests/parity -q

      - name: Windows Python compatibility smoke
        if: runner.os == 'Windows'
        run: python -m pytest python/jikji/tests/test_jikji_prepare.py::test_prepare_recovers_stale_lock -q

      - name: Documentation smoke
        run: cargo doc --workspace --all-features --no-deps

      - name: Cross-OS command smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Path (Join-Path $root "docs") | Out-Null
          Set-Content -Path (Join-Path $root "docs/acme.txt") -Value "ACME release smoke marker"
          cargo run -p jikji-cli --bin jikji -- --help | Out-Null
          cargo run -p jikji-cli --bin jikji -- prepare $root --json
          cargo run -p jikji-cli --bin jikji -- doctor $root --json
          cargo run -p jikji-cli --bin jikji -- find $root "ACME release smoke marker" --json
